{% macro render_avatar(name, url=None, size='w-10 h-10') %}
<div
  class="{{ size }} rounded-xl overflow-hidden border border-white/10 flex-shrink-0 bg-brand-dark/50"
>
  {% if url %}
  <img src="{{ url }}" class="w-full h-full object-cover" />
  {% else %}
  <img
    src="https://ui-avatars.com/api/?name={{ name|urlencode }}&background=3FD0C9&color=02353C&bold=true"
    class="w-full h-full"
  />
  {% endif %}
</div>
{% endmacro %}
