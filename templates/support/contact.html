{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto py-12">
  <div class="text-center mb-10">
    <h1 class="text-4xl font-black text-white uppercase tracking-tighter">
      Contact <span class="text-brand-teal">Support</span>
    </h1>
    <p class="text-white/50 text-sm font-bold uppercase tracking-widest mt-4">
      Have an issue? Let us know.
    </p>
  </div>
  
  <div class="bg-white/5 border border-white/10 p-8 rounded-[2rem] shadow-2xl">
    <form action="{{ url_for('support.contact') }}" method="POST" class="space-y-6">
      <div>
        <label for="subject" class="block text-xs font-black text-white/50 uppercase tracking-[0.2em] mb-2">Subject</label>
        <input type="text" id="subject" name="subject" required
          class="w-full bg-white/5 border border-white/20 text-white text-sm font-bold px-5 py-4 rounded-xl focus:outline-none focus:border-brand-teal focus:bg-white/10 transition-all placeholder:text-white/30"
          placeholder="E.g. Bug with my profile">
      </div>
      <div>
        <label for="message" class="block text-xs font-black text-white/50 uppercase tracking-[0.2em] mb-2">Message</label>
        <textarea id="message" name="message" rows="5" required
          class="w-full bg-white/5 border border-white/20 text-white text-sm font-bold px-5 py-4 rounded-xl focus:outline-none focus:border-brand-teal focus:bg-white/10 transition-all placeholder:text-white/30"
          placeholder="Describe your problem in detail..."></textarea>
      </div>
      <button type="submit" class="street-btn w-full py-4 text-sm mt-4">
        Send Message
      </button>
    </form>
  </div>
</div>
{% endblock %}
