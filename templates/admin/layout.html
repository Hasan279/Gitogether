{% extends 'base.html' %}
{% block content %}
<div class="max-w-7xl mx-auto space-y-8 pb-20 px-4">
  <div class="flex justify-between items-end">
    <div>
      <h1 class="text-5xl font-black text-white uppercase tracking-tighter">
        Admin <span class="text-brand-teal">Command</span>
      </h1>
      <p class="text-white/60 text-xs font-black uppercase tracking-[0.3em] mt-3">
        Platform Oversight & Statistics
      </p>
    </div>
    <div class="px-6 py-3 bg-brand-teal/10 border border-brand-teal/30 rounded-2xl shadow-lg shadow-brand-teal/5">
      <span class="text-brand-teal text-xs font-black uppercase tracking-widest flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-brand-teal animate-pulse"></span>
        System Online
      </span>
    </div>
  </div>

  <nav class="flex flex-wrap gap-2 border-b border-white/10 pb-4">
    <a href="{{ url_for('admin.panel', tab='dashboard') }}" 
       class="px-4 py-2 text-xs font-black uppercase tracking-widest transition-colors {% if tab == 'dashboard' %}text-brand-teal border-b-2 border-brand-teal{% else %}text-white/50 hover:text-white{% endif %}">
      Dashboard
    </a>
    <a href="{{ url_for('admin.panel', tab='projects') }}" 
       class="px-4 py-2 text-xs font-black uppercase tracking-widest transition-colors {% if tab == 'projects' %}text-brand-teal border-b-2 border-brand-teal{% else %}text-white/50 hover:text-white{% endif %}">
      Projects
    </a>
    <a href="{{ url_for('admin.panel', tab='developers') }}" 
       class="px-4 py-2 text-xs font-black uppercase tracking-widest transition-colors {% if tab == 'developers' %}text-brand-teal border-b-2 border-brand-teal{% else %}text-white/50 hover:text-white{% endif %}">
      Developers
    </a>
    <a href="{{ url_for('admin.panel', tab='ratings') }}" 
       class="px-4 py-2 text-xs font-black uppercase tracking-widest transition-colors {% if tab == 'ratings' %}text-brand-teal border-b-2 border-brand-teal{% else %}text-white/50 hover:text-white{% endif %}">
      Ratings
    </a>
    <a href="{{ url_for('admin.panel', tab='support') }}" 
       class="px-4 py-2 text-xs font-black uppercase tracking-widest transition-colors {% if tab == 'support' %}text-brand-teal border-b-2 border-brand-teal{% else %}text-white/50 hover:text-white{% endif %}">
      Support
    </a>
  </nav>

  <div class="space-y-8">
    {% block admin_content %}{% endblock %}
  </div>

</div>
<script>
  (function () {
    const key = "scroll:" + window.location.pathname + window.location.search;
    const savedY = sessionStorage.getItem(key);
    if (savedY !== null) {
      window.scrollTo(0, parseInt(savedY, 10) || 0);
    }

    let ticking = false;
    const saveScroll = () => {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(() => {
        sessionStorage.setItem(key, String(window.scrollY));
        ticking = false;
      });
    };

    window.addEventListener("scroll", saveScroll, { passive: true });
    window.addEventListener("beforeunload", saveScroll);
    window.addEventListener("pagehide", saveScroll);
  })();
</script>
{% endblock %}
