{% extends 'base.html' %} {% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div
    class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-2xl"
  >
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
      <p class="text-brand-light/60">
        Enter your credentials to access Gitogether
      </p>
    </div>

    <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-brand-light mb-2"
          >Email Address</label
        >
        <input
          type="email"
          name="email"
          required
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-teal/50 transition"
          placeholder="dev@example.com"
        />
      </div>

      <div>
        <div class="flex justify-between mb-2">
          <label class="text-sm font-medium text-brand-light">Password</label>
        </div>
        <div class="relative">
          <input
            id="login-password"
            type="password"
            name="password"
            required
            class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 pr-12 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-teal/50 transition"
            placeholder="••••••••"
          />
          <button
            type="button"
            id="toggle-login-password"
            class="absolute inset-y-0 right-0 px-4 text-brand-light/60 hover:text-brand-teal transition-colors"
            aria-label="Show password"
            aria-pressed="false"
          >
            <svg
              id="icon-eye"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 12s3.75-6.75 9.75-6.75S21.75 12 21.75 12s-3.75 6.75-9.75 6.75S2.25 12 2.25 12Z"
              />
              <circle cx="12" cy="12" r="3.25" />
            </svg>
            <svg
              id="icon-eye-off"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              class="w-5 h-5 hidden"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 3l18 18M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-4.4M9.9 5.3A10.1 10.1 0 0 1 12 5c6 0 9.75 7 9.75 7a16.6 16.6 0 0 1-4.4 5.2M6.2 6.2A16.6 16.6 0 0 0 2.25 12s3.75 6.75 9.75 6.75a9.7 9.7 0 0 0 3-.45"
              />
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-brand-emerald hover:bg-brand-teal text-brand-dark font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-brand-emerald/10 active:scale-[0.98]"
      >
        Sign In
      </button>
    </form>

    <p class="mt-8 text-center text-sm text-brand-light/60">
      Don't have an axcount?
      <a
        href="{{ url_for('auth.register') }}"
        class="text-brand-teal font-semibold hover:underline"
        >Create one</a
      >
    </p>
  </div>
</div>
<script>
  (function () {
    const input = document.getElementById("login-password");
    const toggle = document.getElementById("toggle-login-password");
    const eye = document.getElementById("icon-eye");
    const eyeOff = document.getElementById("icon-eye-off");
    if (!input || !toggle || !eye || !eyeOff) return;

    toggle.addEventListener("click", () => {
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      toggle.setAttribute("aria-pressed", show ? "true" : "false");
      toggle.setAttribute("aria-label", show ? "Hide password" : "Show password");
      eye.classList.toggle("hidden", show);
      eyeOff.classList.toggle("hidden", !show);
    });
  })();
</script>
{% endblock %}
