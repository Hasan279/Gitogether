{% extends 'base.html' %} {% block content %}
<div class="max-w-2xl mx-auto">
  <div
    class="bg-white/5 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-2xl"
  >
    <div class="mb-10">
      <h2 class="text-3xl font-bold text-white mb-2">Join the Community</h2>
      <p class="text-brand-light/60">
        Create your developer profile and start collaborating.
      </p>
    </div>

    <form
      action="{{ url_for('auth.register') }}"
      method="POST"
      class="grid grid-cols-1 md:grid-cols-2 gap-6"
    >
      <div class="md:col-span-2 border-b border-white/10 pb-4 mb-2">
        <h3 class="text-brand-teal font-bold uppercase tracking-wider text-xs">
          Account Credentials
        </h3>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-medium text-brand-light">Email</label>
        <input
          type="email"
          name="email"
          required
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
        />
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-medium text-brand-light"
          >Password</label
        >
        <input
          type="password"
          name="password"
          required
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
        />
      </div>

      <div class="md:col-span-2 border-b border-white/10 pb-4 mt-4 mb-2">
        <h3 class="text-brand-teal font-bold uppercase tracking-wider text-xs">
          Developer Profile
        </h3>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-medium text-brand-light"
          >Full Name</label
        >
        <input
          type="text"
          name="full_name"
          required
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
        />
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-medium text-brand-light"
          >Years of Experience</label
        >
        <input
          type="number"
          name="years_experience"
          min="0"
          value="0"
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
        />
      </div>

      <div class="md:col-span-2 space-y-2">
        <label class="block text-sm font-medium text-brand-light"
          >Location</label
        >
        <input
          type="text"
          name="location"
          placeholder="e.g. Remote, New York, Karachi"
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
        />
      </div>

      <div class="md:col-span-2 space-y-2">
        <label class="block text-sm font-medium text-brand-light">Bio</label>
        <textarea
          name="bio"
          rows="3"
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
          placeholder="Tell us what you're building..."
        ></textarea>
      </div>

      <div class="md:col-span-2 space-y-2">
        <label class="block text-sm font-medium text-brand-light"
          >Contact Link (GitHub/Portfolio)</label
        >
        <input
          type="url"
          name="contact_link"
          placeholder="https://github.com/username"
          class="w-full bg-brand-dark/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-brand-teal/50 outline-none transition"
        />
      </div>

      <div class="md:col-span-2 pt-6">
        <button
          type="submit"
          class="w-full bg-brand-emerald hover:bg-brand-teal text-brand-dark font-bold py-4 rounded-xl transition-all shadow-xl shadow-brand-emerald/10"
        >
          Create My Profile
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
