{% extends 'base.html' %} {% block content %}
<script
  defer
  src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
></script>

<div class="max-w-3xl mx-auto" x-data="{ search: '', limit: 40 }">
  <div class="mb-5">
    <a
      href="{{ url_for('dashboard.index') }}"
      class="text-brand-teal hover:text-white text-xs font-black uppercase tracking-widest transition-colors mb-3 inline-flex items-center gap-2"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        ></path>
      </svg>
      Return to Dashboard
    </a>
    <h1 class="text-3xl font-black text-white tracking-tighter uppercase">
      Create New Project
    </h1>
    <p class="text-brand-light/40 mt-1 text-xs uppercase tracking-[0.1em]">
      Initialize a new collaboration sequence
    </p>
  </div>

  <div
    class="bg-gradient-to-b from-white/10 to-white/5 backdrop-blur-xl border border-white/10 p-6 md:p-8 rounded-3xl shadow-2xl relative overflow-hidden"
  >
    <div
      class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-teal via-brand-emerald to-brand-teal opacity-50"
    ></div>

    <form
      action="{{ url_for('projects.create') }}"
      method="POST"
      class="space-y-4"
    >
      <div class="space-y-1.5">
        <label
          class="block text-[10px] font-black text-brand-teal uppercase tracking-[0.2em]"
          >Project Title</label
        >
        <input
          type="text"
          name="title"
          required
          class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white font-mono text-sm placeholder-custom focus:outline-none focus:border-brand-teal transition shadow-inner"
          placeholder="e.g. neural_network_visualizer"
        />
      </div>

      <div class="space-y-1.5">
        <label
          class="block text-[10px] font-black text-brand-teal uppercase tracking-[0.2em]"
          >System Description</label
        >
        <textarea
          name="description"
          rows="3"
          required
          class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white font-mono text-xs placeholder-custom focus:outline-none focus:border-brand-teal transition shadow-inner resize-none"
          placeholder="Define project scope, architecture, and objectives..."
        ></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label
            class="block text-[10px] font-black text-brand-teal uppercase tracking-[0.2em]"
            >Location</label
          >
          <input
            type="text"
            name="location"
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-white font-mono text-xs placeholder-custom focus:outline-none focus:border-brand-teal transition shadow-inner"
            placeholder="eg. Karachi"
          />
        </div>

        <div class="space-y-1.5">
          <label
            class="block text-[10px] font-black text-brand-teal uppercase tracking-[0.2em]"
            >Devs Required</label
          >
          <input
            type="number"
            name="slots_needed"
            min="1"
            value="1"
            required
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-white font-mono text-xs focus:outline-none focus:border-brand-teal transition shadow-inner"
          />
        </div>
      </div>

      <div class="space-y-4 pt-4 border-t border-white/10 mt-4">
        <div
          class="flex flex-col md:flex-row md:items-center justify-between gap-4"
        >
          <label
            class="block text-[10px] font-black text-brand-teal uppercase tracking-[0.2em]"
            >Required Skill Stack</label
          >

          <div class="relative w-full md:w-64">
            <input
              type="text"
              x-model="search"
              @input="limit = 40"
              placeholder="Filter skills..."
              class="w-full bg-black/60 border border-white/20 rounded-xl px-4 py-2 text-[11px] font-mono text-brand-teal placeholder-custom focus:outline-none focus:border-brand-teal transition shadow-lg"
            />
            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 opacity-50 pointer-events-none"
            >
              <svg
                class="w-3 h-3 text-brand-teal"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <div
          class="max-h-72 overflow-y-auto pr-2 bg-black/30 rounded-2xl border border-white/5 p-5 shadow-inner custom-scrollbar"
          @scroll.throttle.100ms="if($el.scrollTop + $el.clientHeight >= $el.scrollHeight - 50) limit += 20"
        >
          {% for category, skill_list in grouped_skills.items() %}
          <div class="mb-8 last:mb-0">
            <h4
              class="text-[10px] text-white/40 font-black uppercase tracking-[0.4em] mb-4 flex items-center gap-4"
            >
              {{ category }}
              <div class="h-[1px] flex-1 bg-white/10"></div>
            </h4>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5">
              {% for skill in skill_list %}
              <label
                class="relative cursor-pointer group"
                x-show="search === '' || '{{ skill.skill_name|lower }}'.includes(search.toLowerCase())"
              >
                <input
                  type="checkbox"
                  name="skills"
                  value="{{ skill.skill_id }}"
                  class="peer sr-only"
                />
                <div
                  class="bg-white/5 border border-white/10 text-white/80 px-3 py-2.5 rounded-xl text-[11px] font-mono font-bold tracking-tighter text-center transition-all peer-checked:bg-brand-teal/20 peer-checked:border-brand-teal peer-checked:text-brand-teal hover:border-white/30 hover:bg-white/10 active:scale-95"
                >
                  {{ skill.skill_name }}
                </div>
              </label>
              {% endfor %}
            </div>
          </div>
          {% endfor %}
        </div>
      </div>

      <div class="pt-6 mt-4 border-t border-white/10 flex justify-center">
        <button
          type="submit"
          class="w-full md:w-2/3 bg-brand-emerald hover:bg-brand-teal text-brand-dark font-black py-4 rounded-xl transition-all shadow-[0_0_25px_rgba(46,175,125,0.2)] hover:scale-[1.02] active:scale-[0.98] text-sm uppercase tracking-[0.2em]"
        >
          Deploy Project
        </button>
      </div>
    </form>
  </div>
</div>

<style>
  /* Fix Dull Placeholder */
  .placeholder-custom::placeholder {
    color: rgba(63, 208, 201, 0.4) !important;
    opacity: 1 !important;
  }

  /* Modern Inset Scrollbar */
  .custom-scrollbar::-webkit-scrollbar {
    width: 4px;
  }
  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(63, 208, 201, 0.2);
    border-radius: 10px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: rgba(63, 208, 201, 0.6);
  }
</style>
{% endblock %}
